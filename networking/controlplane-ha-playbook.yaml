- name: Configure HA control plane API server
  hosts: routers
  tasks:
    - name: Enable HAProxy to bind to non-local VIP
      become: true
      ansible.posix.sysctl:
        name: net.ipv4.ip_nonlocal_bind
        value: "1"
        state: present
        sysctl_set: true
        reload: true
    - name: Install HAProxy
      become: true
      ansible.builtin.apt:
        name: haproxy
    - name: Configure HAProxy
      become: true
      ansible.builtin.template:
        src: templates/router-haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        mode: "644"
    - name: Enable HAProxy
      become: true
      ansible.builtin.systemd:
        service: haproxy
        enabled: true
    - name: Restart HAProxy
      become: true
      ansible.builtin.systemd:
        service: haproxy
        state: restarted
      retries: 3
      delay: 5
