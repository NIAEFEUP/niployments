apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "valkey-sentinel.name" . }}
  namespace: {{ include "valkey-sentinel.namespace" . }}
spec:
  serviceName: {{ include "valkey-sentinel.name" . }}-headless
  replicas: {{ .Values.valkey.replicas }}
  selector:
    matchLabels:
      app: {{ include "valkey-sentinel.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "valkey-sentinel.name" . }}
    spec:
      initContainers:
        - name: init-config
          image: busybox
          command: ["sh", "/scripts/init-valkey.sh"]
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /etc/valkey
              readOnly: true
            - name: scripts
              mountPath: /scripts
            - name: workdir
              mountPath: /config
            - name: data
              mountPath: /data
      containers:
        - name: valkey
          image: {{ .Values.valkey.image }}
          ports:
            - name: client
              containerPort: {{ .Values.valkey.port }}
          command: ["valkey-server", "/etc/valkey/valkey.conf"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: workdir
              mountPath: /etc/valkey
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-auth
                  key: password
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
{{ toYaml .Values.valkey.resources | indent 12 }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli -a \"$VALKEY_PASSWORD\" -p {{ .Values.valkey.port }} ping | grep -q PONG"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli -a \"$VALKEY_PASSWORD\" -p {{ .Values.valkey.port }} ping | grep -q PONG"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6

        {{- if .Values.valkey.exporter.enabled }}
        - name: redis-exporter
          image: {{ .Values.valkey.exporter.image }}
          ports:
            - name: metrics
              containerPort: {{ .Values.valkey.exporter.port }}
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:{{ .Values.valkey.port }}"
          securityContext:
            runAsUser: 59000
            runAsGroup: 59000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
{{ toYaml .Values.valkey.exporter.resources | indent 12 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: valkey-config
            items:
              - key: valkey.conf
                path: valkey.conf
        - name: scripts
          configMap:
            name: valkey-config
            items:
              - key: init-valkey.sh
                path: init-valkey.sh
            defaultMode: 0755
        - name: workdir
          emptyDir: {}
  {{- if .Values.valkey.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ toYaml .Values.valkey.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.valkey.persistence.size }}
  {{- end }}
