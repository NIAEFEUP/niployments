{{- if .Values.security.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: valkey-sentinel-netpol
  namespace: {{ include "valkey-sentinel.namespace" . }}
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Allow same-namespace traffic
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "valkey-sentinel.namespace" . }}
    # Allow listed client namespaces
    - from:
        {{- range .Values.security.networkPolicy.allowedClientNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow intra-cluster traffic (tighten later if you want)
    - to:
        - namespaceSelector: {}
{{- end }}
