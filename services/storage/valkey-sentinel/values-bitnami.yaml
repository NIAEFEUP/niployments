architecture: replication

auth:
  enabled: true
  password: "GreatPass"
  # If you want Sentinel to require auth too (recommended):
  sentinel: true

# In Sentinel mode, Bitnami deploys a single StatefulSet where each Pod runs Valkey + Sentinel.
sentinel:
  enabled: true
  masterSet: "MasterReplica"
  quorum: 2
  downAfterMilliseconds: 5000
  failoverTimeout: 60000
  parallelSyncs: 1

  resources:
    requests:
      cpu: 50m
      memory: 100Mi

# Node count.
# In Sentinel mode you typically size the cluster here.
replica:
  replicaCount: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    enabled: true
    size: 2Gi
    accessModes:
      - ReadWriteOnce

# Keep primary defined too (some chart codepaths still reference it),
# but in Sentinel mode the “single StatefulSet” model is used.
primary:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    enabled: true
    size: 2Gi
    accessModes:
      - ReadWriteOnce

metrics:
  enabled: true
  image:
    repository: bitnami/redis-exporter
    tag: "latest"
  resources:
    requests:
      cpu: 50m
      memory: 80Mi

networkPolicy:
  enabled: true
