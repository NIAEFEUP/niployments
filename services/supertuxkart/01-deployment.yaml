---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supertuxkart-server
  namespace: supertuxkart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supertuxkart
  template:
    metadata:
      labels:
        app: supertuxkart
    spec:
      containers:
      - name: supertuxkart
        image: jwestp/supertuxkart:latest
        ports:
        - containerPort: 2757
          protocol: UDP
        - containerPort: 2759
          protocol: UDP
        volumeMounts:
        - name: config
          mountPath: /stk
          readOnly: true
        env:
        - name: AI_KARTS
          value: "4"
      volumes:
      - name: config
        configMap:
          name: supertuxkart-config
          items:
          - key: server_config.xml
            path: server_config.xml
---
apiVersion: v1
kind: Service
metadata:
  name: supertuxkart-service
  namespace: supertuxkart
spec:
  selector:
    app: supertuxkart
  ports:
  - port: 2757
    targetPort: 2757
    protocol: UDP
    name: game
  - port: 2759
    targetPort: 2759
    protocol: UDP
    name: discovery
  type: ClusterIP
