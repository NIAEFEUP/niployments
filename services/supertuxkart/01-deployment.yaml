---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supertuxkart-server
  namespace: supertuxkart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supertuxkart
  template:
    metadata:
      labels:
        app: supertuxkart
    spec:
      containers:
      - name: supertuxkart
        image: peucastro/stk-server:latest
        ports:
        - containerPort: 2759
          protocol: UDP
          name: game
        env:
        - name: SERVER_NAME
          value: "NI SuperTuxKart Server"
        - name: SERVER_MODE
          value: "0"
        - name: SERVER_DIFFICULTY
          value: "3"
        - name: MAX_PLAYERS
          value: "20"
---
apiVersion: v1
kind: Service
metadata:
  name: supertuxkart-service
  namespace: supertuxkart
spec:
  selector:
    app: supertuxkart
  ports:
  - port: 2759
    targetPort: 2759
    protocol: UDP
    name: game
  type: ClusterIP
