
hydra:
  config:
    dsn: memory

    serve:
      cookies:
        same_site_mode: Lax

    urls:
      self:
        issuer: http://127.0.0.1:4444/
      consent: http://127.0.0.1:4455/consent
      login: http://127.0.0.1:4455/login
      logout: http://127.0.0.1:4455/logout
      device:
        verification: http://127.0.0.1:4455/device/verify
        success: http://127.0.0.1:4455/device/success


      identity_provider:
        url: http://127.0.0.1:4434
        publicUrl: http://127.0.0.1:4433
        headers:
          Authorization: Bearer some-token


    secrets:
      system:
        - youReallyNeedToChangeThis

    oidc:
      subject_identifiers:
        supported_types:
          - pairwise
          - public
        pairwise:
          salt: youReallyNeedToChangeThis

  dev: true