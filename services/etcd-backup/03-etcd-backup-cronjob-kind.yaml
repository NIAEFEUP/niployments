apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup-job
  namespace: etcd-backup
  labels:
    app: etcd-backup
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: etcd-backup
        spec:
          serviceAccountName: etcd-backup-sa
          restartPolicy: OnFailure
          hostNetwork: true
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          containers:
            - name: etcd-backup
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: etcd-backup-s3-credentials
              env:
                - name: ETCD_ENDPOINTS
                  value: "https://127.0.0.1:2379"
              volumeMounts:
                - name: etcd-certs
                  mountPath: /etc/kubernetes/pki/etcd/
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
              command:
                - /bin/bash
                - /scripts/backup.sh
          volumes:
            - name: etcd-certs
              hostPath:
                path: /etc/kubernetes/pki/etcd/
                type: Directory
            - name: tmp
              emptyDir: {}
            - name: backup-script
              configMap:
                name: etcd-backup-script
                defaultMode: 0755
