# Default values for minecraft.
# Declare variables to be passed into your templates.

# Resource names for explicit control
resourceNames:
  deployment: "minicraft-server"
  service: "minicraft-server"
  pvc: "minicraft-data-pvc"
  ingress: "minicraft-irtcp"
  configMap: "minecraft-whitelist"
  cronjob: "minicraft-reboot"
  serviceAccount: "minicraft-restart-sa"
  role: "minicraft-restart-role"
  roleBinding: "minicraft-restart-rb"

# Standard labels applied to all resources
commonLabels:
  app: "minecraft-server"
  app.kubernetes.io/name: "minicraft"
  managed-by: "helm"

minecraft:
  name: "minicraft"
  type: "FABRIC"
  version: "1.20.1"
  gamemode: "survival"
  motd: "Bem-vindos ao miNIcraft!"
  port: 30565
  onlineMode: false
  enableWhitelist: true
  whitelist: Tomili2000,peu,Pinho,Sp1kyBtw,Darguima,pmpy_,skaffoldf
  stopDelay: 60
  replicas: 1
  allowFlight: true
  eula: true
  modrinth:
    projects:
      - fabric-api
      - lithium
      - skinrestorer
      - servercore
      - modernfix
      - ferritecore
      - memoryleakfix
      - chunky
      - c2me
      - krypton
      - vmp
      - clumps
      - letmedespawn
      - get-it-together-drops
      - spark
    downloadDependencies: "required"
    allowedVersionType: "release"

image:
  repository: itzg/minecraft-server
  tag: java21
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

ingress:
  entryPoints:
    - minecraft
  match: "ClientIP(`0.0.0.0/0`)"

probes:
  startup:
    initialDelaySeconds: 30
    failureThreshold: 30
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 30
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30

volume:
  storage: 6Gi
  storageClassName: longhorn-locality-no-backup
  mountPath: /data
  accessModes:
    - ReadWriteOnce

resources:
  limits:
    memory: 4Gi
    cpu: "2"
  requests:
    memory: 2Gi
    cpu: "1"

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

restart:
  # Run everyday at 7:00 AM
  schedule: "0 7 * * *"
  kubectlImage: bitnami/kubectl:latest
