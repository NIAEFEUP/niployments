apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ .Values.minecraft.name }}-irtcp
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - minecraft
  routes:
    - match: ClientIP(`0.0.0.0/0`)
      kind: Rule
      services:
        - name: {{ .Values.minecraft.name }}-server
          port: {{ .Values.minecraft.port }}
