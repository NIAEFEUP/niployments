apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ .Values.resourceNames.ingress }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- toYaml .Values.commonLabels | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingress.entryPoints | nindent 4 }}
  routes:
    - match: {{ .Values.ingress.match }}
      kind: Rule
      services:
        - name: {{ .Values.resourceNames.service }}
          port: {{ .Values.minecraft.port }}
