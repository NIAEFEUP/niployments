apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ .Values.resourceNames.ingress }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- toYaml .Values.commonLabels | nindent 4 }}
spec:
  entryPoints:
    - minecraft
  routes:
    - match: ClientIP(`0.0.0.0/0`)
      kind: Rule
      services:
        - name: {{ .Values.resourceNames.service }}
          port: {{ .Values.minecraft.port }}
