# docker run -d -it -v /path/on/host:/data -e EULA=TRUE -p 25565:25565 --name mc itzg/minecraft-server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.minecraft.name }}-server
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-server
  template:
    metadata:
      labels:
        app: minecraft-server
    spec:
      volumes:
      - name: minecraft-data
        persistentVolumeClaim:
          claimName: {{ .Values.minecraft.name }}-data-pvc
      containers:
      - name: minecraft-server
        image: itzg/minecraft-server:latest
        resources:
          limits:
            memory: "{{ .Values.resources.limits.memory }}"
          requests:
            memory: "{{ .Values.resources.requests.memory }}"
        env:
          - name: TYPE
            value: "{{.Values.minecraft.type}}"
          - name: VERSION
            value: "{{.Values.minecraft.version}}"
          - name:  EULA
            value: 'TRUE'
          - name: MODE
            value: "{{ .Values.minecraft.gamemode }}"
          - name: MOTD
            value: "{{ .Values.minecraft.motd }}"
          - name: ALLOW_FLIGHT
            value: 'TRUE'
          - name: SERVER_PORT
            value: "{{ .Values.minecraft.port }}"
          - name: ONLINE_MODE
            value: "{{ .Values.minecraft.onlineMode }}"
          - name: ENABLE_WHITELIST
            value: "{{ .Values.minecraft.enableWhitelist }}"
        ports:
        - containerPort: {{ .Values.minecraft.port }}
          name: minecraft
        volumeMounts:
          - name: minecraft-data
            mountPath: {{ .Values.volume.mountPath }}
        readinessProbe:
          exec:
            command:
            - mc-monitor
            - status
            - -host
            - 127.0.0.1
            - -port
            - "{{ .Values.minecraft.port }}"
          initialDelaySeconds: 30
          periodSeconds: 30
        livenessProbe:
          exec:
            command:
            - mc-monitor
            - status
            - -host
            - 127.0.0.1
            - -port
            - "{{ .Values.minecraft.port }}"
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.minecraft.name }}-server
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.minecraft.port }}
      targetPort: {{ .Values.minecraft.port }}
  selector:
    app: minecraft-server
