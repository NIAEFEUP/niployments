# docker run -d -it -v /path/on/host:/data -e EULA=TRUE -p 25565:25565 --name mc itzg/minecraft-server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.minecraft.name }}-server
  labels:
    app: minecraft-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-server
  template:
    metadata:
      labels:
        app: minecraft-server
    spec:
      volumes:
      - name: minecraft-data
        persistentVolumeClaim:
          claimName: {{ .Values.minecraft.name }}-data-pvc
      containers:
      - name: minecraft-server
        image: itzg/minecraft-server:latest
        resources:
          limits:
            memory: "{{ .Values.resources.limits.memory }}"
          requests:
            memory: "{{ .Values.resources.requests.memory }}"
        env:
          - name: TYPE
            value: "{{.Values.minecraft.type}}"
          - name: VERSION
            value: "{{.Values.minecraft.version}}"
          - name:  EULA
            value: 'TRUE'
          - name: MODE
            value: "{{ .Values.minecraft.gamemode }}"
          - name: MOTD
            value: "{{ .Values.minecraft.motd }}"
          - name: ALLOW_FLIGHT
            value: 'TRUE'
          - name: SERVER_PORT
            value: "{{ .Values.minecraft.port }}"
          - name: ONLINE_MODE
            value: "{{ .Values.minecraft.onlineMode }}"
        ports:
        - containerPort: {{ .Values.minecraft.port }}
          name: minecraft
        volumeMounts:
          - name: minecraft-data
            mountPath:  /data
        readinessProbe:
          exec:
            command:
            - mc-monitor
            - status
            - -host
            - 127.0.0.1
            - -port
            - "{{ .Values.minecraft.port }}"
          initialDelaySeconds: 30
          periodSeconds: 30
        livenessProbe:
          exec:
            command:
            - mc-monitor
            - status
            - -host
            - 127.0.0.1
            - -port
            - "{{ .Values.minecraft.port }}"
          initialDelaySeconds: 30
          periodSeconds: 30
---
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "minecraft.serviceAccountName" . }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.minecraft.name }}-server
  labels:
    app: minecraft-server
spec:
  type: NodePort
  ports:
    - port: {{ .Values.minecraft.port }}
      targetPort: {{ .Values.minecraft.port }}
      nodePort: {{ .Values.minecraft.port }}
      protocol: TCP
      name: minecraftnodeport
  selector:
    app: minecraft-server
