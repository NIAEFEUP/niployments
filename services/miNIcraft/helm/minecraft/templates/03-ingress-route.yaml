apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Values.minecraft.name }}-irtcp
  namespace: {{ .Values.minecraft.namespace }}
spec:
  entryPoints:
    - minecraft
  routes:
    - match: HostSNI(`*`)
      services:
        - name: {{ .Values.minecraft.name }}-server
          port: {{ .Values.minecraft.port }}
  tls:
    secretName: {{ .Values.minecraft.name }}-cert