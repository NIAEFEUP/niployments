apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.minecraft.name }}-cert
  namespace: {{ .Values.minecraft.namespace }}
spec:
  secretName: {{ .Values.minecraft.name }}-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: minicraft.niaefeup.pt
  dnsNames:
    - minicraft.niaefeup.pt
