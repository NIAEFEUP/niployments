---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.minecraft.name }}-data
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: longhorn-locality-no-backup
  local:
    path: "{{ .Values.volume.path }}"
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - "{{ .Values.node.hostname }}"
