minio:
  enabled: true
global:
    dnsService:  "rke2-coredns-rke2-coredns" 
loki:
  extraArgs:
    - "-config.expand-env=true"
  schemaConfig:
    configs:
      - from: "2024-11-01"
        object_store: s3
        store: tsdb
        schema: v13
        index:
          prefix: index_
          period: 24h
backend:
  persistence:
    enabled: true
    size: 3Gi
    storageClass: "longhorn-locality-no-backup"

write:
  persistence:
    enabled: true
    size: 3Gi
    storageClass: "longhorn-locality-no-backup"

read:
  persistence:
    enabled: true
    size: 3Gi
    storageClass: "longhorn-locality-no-backup"
